name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GOPRIVATE: github.com/chinudotdev/pith

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
