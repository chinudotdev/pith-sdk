name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GOPRIVATE: github.com/chinudotdev/pith

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test with race detector
        run: go test -race ./...

      - name: Build core examples
        run: |
          go build ./examples/01-hello/...
          go build ./examples/02-tools/...

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            mcp:
              - 'mcp/**'
              - 'examples/05-mcp/**'

      - name: Build MCP example
        if: steps.changes.outputs.mcp == 'true'
        run: go build ./examples/05-mcp/...
